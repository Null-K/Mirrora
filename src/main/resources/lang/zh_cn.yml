command:
  usage: "正确命令: <#cee2f0>/mirror [wand|create|remove|list|reload]"
  player-only: "该命令只能由玩家执行"
  wand:
    success: "已获得镜子选区工具，<#cee2f0>左键</#cee2f0>选择点 1，<#cee2f0>右键</#cee2f0>选择点 2"
  create:
    usage: "正确命令: <#cee2f0>/mirror create <id> [深度]"
    duplicate: "已存在同名镜子: <#cee2f0><arg>"
    invalid-depth: "深度必须是一个正数"
    depth-range: "深度必须在 <#cee2f0>0</#cee2f0> 到 <#cee2f0><arg></#cee2f0> 之间"
    no-selection: "请先用工具选取两个点 (<#cee2f0>/mirror wand</#cee2f0>)"
    face-mismatch: "两个选点的朝向不一致，请重新选取"
    different-world: "创建失败，两个选点必须在同一个世界"
    success: "镜子 <#cee2f0><arg></#cee2f0> 创建成功"
  remove:
    usage: "正确命令: <#cee2f0>/mirror remove <id>"
    success: "镜子 <#cee2f0><arg></#cee2f0> 已移除"
    not-found: "找不到镜子: <#cee2f0><arg>"
  list:
    empty: "当前没有任何镜子"
    header: "共有 <#cee2f0><arg></#cee2f0> 面镜子:"
    entry: " - <#cee2f0><arg1></#cee2f0> @ <arg2> (<arg3>，深度 <arg4>)"
  reload:
    success: "配置与语言文件已重新加载"

wand-listener:
  invalid-face: "请点击垂直的墙面 (不能是地面或天花板)"
  point1: "已选取第一个点: <#cee2f0><arg1></#cee2f0>，朝向: <#cee2f0><arg2></#cee2f0>"
  point2: "已选取第二个点: <#cee2f0><arg1></#cee2f0>，朝向: <#cee2f0><arg2></#cee2f0>"
  face-mismatch: "两个选点的朝向不一致，请确保两点都在同一面墙上"

wand-item:
  name: "镜子选区工具"
  lore1: " 左键: 选取第一个点"
  lore2: " 右键: 选取第二个点"
  lore3: " 两点必须点在同一朝向的墙面上"
